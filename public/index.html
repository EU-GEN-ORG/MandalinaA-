<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MandalinaAİ - Material 3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="m3-app-container">
        <header class="m3-top-app-bar">
            <span class="m3-icon">🍊</span>
            <h1 class="m3-title">MandalinaAİ</h1>
        </header>
        
        <main id="chat-box" class="m3-chat-surface"></main>

        <footer class="m3-input-container">
            <input type="text" id="user-input" class="m3-input-field" placeholder="MandalinaAİ'ye bir şeyler sor..." autocomplete="off">
            <button id="send-btn" class="m3-icon-button" aria-label="Gönder">
                <span class="material-symbols-outlines">send</span>
            </button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
